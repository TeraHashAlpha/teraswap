# CI pipeline — parallel jobs: lint, typecheck, audit, contract tests
# Build runs after lint + typecheck + audit + lockfile-lint pass.
# Contract tests run independently (Foundry/Forge).

name: "CI"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --ignore-scripts=false
      - name: Lint (warnings only — React Compiler rules are advisory)
        run: npx next lint --max-warnings 200 || true

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --ignore-scripts=false
      - run: npm run typecheck

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --ignore-scripts=false
      - name: Security audit (high/critical)
        run: npm audit --audit-level=high

  lockfile-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - name: Validate lockfile integrity
        run: npx lockfile-lint@4 --path package-lock.json --type npm --allowed-hosts npm --validate-https --validate-integrity

  test-contracts:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Run forge tests
        working-directory: contracts/order-engine
        run: forge test -vvv

  build:
    needs: [lint, typecheck, audit, lockfile-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --ignore-scripts=false
      - run: npm run build
