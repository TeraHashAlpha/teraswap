name: Monitoring Watchdog

on:
  schedule:
    - cron: '*/5 * * * *' # Every 5 minutes
  workflow_dispatch: {} # Manual trigger for testing

permissions: {} # This workflow needs no repo permissions

concurrency:
  group: monitoring-watchdog
  cancel-in-progress: true

jobs:
  check-heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check monitoring heartbeat
        run: |
          # [API-H-01] Public heartbeat returns only: healthy, ageSeconds, tickFresh
          RESPONSE=$(curl -sf --max-time 10 https://teraswap.app/api/monitor/heartbeat || echo '{"healthy":false,"ageSeconds":-1,"tickFresh":false}')
          HEALTHY=$(echo "$RESPONSE" | jq -r '.healthy')
          AGE=$(echo "$RESPONSE" | jq -r '.ageSeconds // "N/A"')
          TICK_FRESH=$(echo "$RESPONSE" | jq -r '.tickFresh // false')

          echo "Healthy: $HEALTHY"
          echo "Age: ${AGE}s"
          echo "Tick fresh: $TICK_FRESH"

          echo "HEARTBEAT_AGE=$AGE" >> "$GITHUB_ENV"
          echo "HEARTBEAT_HEALTHY=$HEALTHY" >> "$GITHUB_ENV"

          if [ "$HEALTHY" != "true" ]; then
            echo "::error::Monitoring heartbeat unhealthy! Age: ${AGE}s, tickFresh: ${TICK_FRESH}"
            exit 1
          fi

      - name: Alert on failure
        if: failure()
        env:
          WATCHDOG_ALERT_WEBHOOK: ${{ secrets.WATCHDOG_ALERT_WEBHOOK }}
        run: |
          if [ -z "$WATCHDOG_ALERT_WEBHOOK" ]; then
            echo "::warning::WATCHDOG_ALERT_WEBHOOK secret not set — cannot send alert"
            exit 0
          fi
          curl -sf --max-time 10 -X POST \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"🚨 TeraSwap monitoring watchdog FAILED. Healthy: ${HEARTBEAT_HEALTHY}, Age: ${HEARTBEAT_AGE}s. Check: https://teraswap.app/api/monitor/heartbeat\"}" \
            "$WATCHDOG_ALERT_WEBHOOK"
